<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Děkujeme – Tepovače Jablunkov</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --yellow: #F5C800; --black: #0D0D0D; --dark: #141414; --border: #2A2A2A; --text: #E8E8E8; --muted: #888; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center; }
  .icon { font-size: 3rem; margin-bottom: 1.5rem; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(2.5rem, 6vw, 4rem); letter-spacing: 0.03em; color: var(--yellow); margin-bottom: 1rem; }
  p { font-size: 1.05rem; color: var(--muted); max-width: 420px; line-height: 1.7; margin-bottom: 2rem; }
  a { display: inline-block; background: var(--yellow); color: var(--black); padding: 0.8rem 2rem; border-radius: 6px; text-decoration: none; font-weight: 700; font-size: 0.95rem; transition: opacity 0.2s; }
  a:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="icon">✅</div>
  <h1>DĚKUJEME!</h1>
  <p>Vaše poptávka byla odeslána. Ozveme se Vám do 24 hodin – nejčastěji mnohem dříve.</p>
  <a href="/">← Zpět na hlavní stránku</a>
</body>
</html>
